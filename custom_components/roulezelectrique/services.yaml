remote_start:
  name: Remote Start
  description: Starts a remote charging session on a specific charger.
  fields:
    charger_id:
      name: Charger
      description: The charger device to start.
      required: true
      selector:
        device:
          integration: roulezelectrique
    connector_id:
      name: Connector ID
      description: The ID of the connector on the charger (OCPP only).
      required: false
      selector:
        number:
          min: 1
          mode: box
    id_tag:
      name: ID Tag
      description: The RFID/ID tag to authorize with (OCPP only).
      required: false
      selector:
        text:

remote_stop:
  name: Remote Stop
  description: Stops a remote charging session on a specific charger.
  fields:
    charger_id:
      name: Charger
      description: The charger device to stop.
      required: true
      selector:
        device:
          integration: roulezelectrique
    transaction_id:
      name: Transaction ID
      description: The active transaction ID to stop (OCPP only). If omitted, the integration will attempt to retrieve it from the active session.
      required: false
      selector:
        number:
          min: 1
          mode: box

set_power_limit:
  name: Set Power Limit
  description: Sets the maximum charging current (amps) for a specific charger.
  fields:
    charger_id:
      name: Charger
      description: The charger device to configure.
      required: true
      selector:
        device:
          integration: roulezelectrique
    amps:
      name: Current Limit
      description: The maximum charging current in amperes (6 <= amps <= max_amps).
      required: true
      selector:
        number:
          min: 6
          mode: box
